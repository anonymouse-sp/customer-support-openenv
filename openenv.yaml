spec_version: 1
name: customer-support-chat-environment
version: 0.1.0
description: OpenEnv-compatible environment for customer support complaint handling.
type: space
runtime: fastapi
app: app.main:app
port: 7860
entrypoint:
  type: http
  base_url: http://localhost:7860
  endpoints:
    reset: /reset
    step: /step
    state: /state
models:
  reset_request: ResetRequest
  reset_response: ResetResponse
  step_request: StepRequest
  step_response: StepResponse
  state_response: StateResponse
tasks:
  - id: easy_wrong_item
    difficulty: easy
    grader: app.graders:grade_easy_wrong_item
  - id: medium_billing_double_charge
    difficulty: medium
    grader: app.graders:grade_medium_billing_double_charge
  - id: hard_refund_delayed_shipment
    difficulty: hard
    grader: app.graders:grade_hard_refund_delayed_shipment
